<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dharanitharan G — Graphic Designer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #2d0a0a; }
 
    /* SCROLLBAR — thicker */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1e0505; }
    ::-webkit-scrollbar-thumb { background: #f5c842; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #e0a830; }
 
    .npill { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #c9a0a0; cursor: pointer; padding: 6px 14px; border-radius: 20px; transition: all .25s; border: 1px solid transparent; }
    .npill:hover { color: #f5c842; }
    .npill.act { color: #f5c842; border-color: rgba(245,200,66,.4); background: rgba(245,200,66,.08); }
    .gbtn { background: transparent; border: 1px solid #f5c842; color: #f5c842; padding: 11px 28px; font-family: 'Inconsolata', monospace; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; cursor: pointer; transition: all .3s; position: relative; overflow: hidden; }
    .gbtn::before { content: ''; position: absolute; inset: 0; background: #f5c842; transform: translateX(-101%); transition: transform .3s ease; z-index: 0; }
    .gbtn:hover::before { transform: translateX(0); }
    .gbtn-t { position: relative; z-index: 1; transition: color .3s; }
    .gbtn:hover .gbtn-t { color: #2d0a0a; }
    .ghostbtn { background: transparent; border: 1px solid #6b2020; color: #c9a0a0; padding: 9px 22px; font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all .25s; }
    .ghostbtn:hover { border-color: #f5c842; color: #f5c842; }
    .dangerbtn { background: transparent; border: 1px solid rgba(220,80,80,.3); color: rgba(220,80,80,.7); padding: 8px 20px; font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all .25s; }
    .dangerbtn:hover { border-color: #dc5050; color: #dc5050; }
    .field { background: #3d1010; border: 1px solid #6b2020; color: #ffffff; padding: 12px 16px; width: 100%; font-family: 'Inconsolata', monospace; font-size: 13px; outline: none; transition: border-color .25s; }
    .field:focus { border-color: #f5c842; }
    .field::placeholder { color: #7a3535; }
    textarea.field { resize: vertical; min-height: 90px; line-height: 1.7; }
    .lbl { font-family: 'Inconsolata', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #f5c842; margin-bottom: 8px; display: block; }
    .schip { display: inline-flex; align-items: center; gap: 8px; background: rgba(245,200,66,.1); border: 1px solid rgba(245,200,66,.35); color: #f5c842; padding: 6px 14px; font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 1px; }
    .rmsk { background: none; border: none; color: #7a3535; cursor: pointer; font-size: 16px; line-height: 1; padding: 0; transition: color .2s; }
    .rmsk:hover { color: #ff6060; }
    .gcrd { position: relative; overflow: hidden; cursor: pointer; background: #4a1515; aspect-ratio: 1/1; }
    .gcrd img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s cubic-bezier(.25,.46,.45,.94), filter .4s; filter: brightness(.88); }
    .gcrd:hover img { transform: scale(1.07); filter: brightness(1); }
    .gcrd-ov { position: absolute; inset: 0; background: linear-gradient(to top, rgba(45,10,10,.9) 0%, transparent 55%); opacity: 0; transition: opacity .35s; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; gap: 8px; }
    .gcrd:hover .gcrd-ov { opacity: 1; }
    .gcrd-row { display: flex; gap: 8px; }
    .pic-wrap { position: relative; display: inline-block; }
    .pic-hover { position: absolute; inset: 0; background: rgba(45,10,10,.85); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: opacity .3s; cursor: pointer; border: 2px solid rgba(245,200,66,.5); }
    .pic-wrap:hover .pic-hover { opacity: 1; }
    .mover { position: fixed; inset: 0; background: rgba(20,3,3,.97); z-index: 500; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 32px 16px; }
    .mbox { background: #2d0a0a; border: 1px solid #6b2020; width: 100%; max-width: 620px; padding: 40px; margin: auto; }
    .lbov { position: fixed; inset: 0; background: rgba(20,3,3,.97); z-index: 600; display: flex; align-items: center; justify-content: center; }
    .lbbtn { position: absolute; background: rgba(45,10,10,.8); border: 1px solid #6b2020; color: #c9a0a0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; backdrop-filter: blur(4px); border-radius: 50%; width: 44px; height: 44px; }
    .lbbtn:hover { border-color: #f5c842; color: #f5c842; }
    .toast { position: fixed; bottom: 28px; right: 28px; z-index: 800; background: #3d1010; border-left: 2px solid #f5c842; padding: 13px 20px; font-family: 'Inconsolata', monospace; font-size: 11px; letter-spacing: 1px; color: #f5c842; animation: tIn .3s ease; max-width: 280px; line-height: 1.4; }
    .toast.err { border-left-color: #dc5050; color: #ff8080; }
    @keyframes tIn { from { opacity: 0; transform: translateX(24px); } to { opacity: 1; transform: translateX(0); } }
    .dzone { border: 2px dashed #6b2020; text-align: center; cursor: pointer; transition: all .3s; background: #3d1010; }
    .dzone.ov { border-color: #f5c842; background: rgba(245,200,66,.05); }
    .dzone:hover { border-color: #c9a0a0; }
    .addcrd { border: 1px dashed #6b2020; display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 1/1; cursor: pointer; color: #7a3535; transition: all .3s; font-family: 'Inconsolata', monospace; }
    .addcrd:hover { border-color: #f5c842; color: #f5c842; background: rgba(245,200,66,.05); }
    .slink { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border: 1px solid #6b2020; color: #c9a0a0; transition: all .25s; font-family: 'Inconsolata', monospace; font-size: 12px; cursor: pointer; background: #4a1515; width: 100%; text-align: left; }
    .slink:hover { border-color: #f5c842; color: #ffffff; background: rgba(245,200,66,.08); }
    .sbox { border: 1px solid #6b2020; padding: 24px; text-align: center; background: #3d1010; }
    .snum { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 400; color: #f5c842; line-height: 1; margin-bottom: 6px; }
    .slbl { font-family: 'Inconsolata', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #c9a0a0; }
    .avdot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,.6); display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    .la { width: 48px; height: 1px; background: linear-gradient(to right, #f5c842, transparent); }
    .sec-lbl { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 4px; color: #f5c842; text-transform: uppercase; margin-bottom: 14px; }
    input[type=checkbox] { accent-color: #f5c842; width: 14px; height: 14px; cursor: pointer; }
    .mini-row-btn { background: rgba(45,10,10,.85); border: 1px solid rgba(245,200,66,.3); color: #f5c842; padding: 6px 12px; font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 1px; cursor: pointer; transition: all .2s; }
    .mini-row-btn:hover { border-color: #f5c842; color: #ffffff; }
    .mini-row-btn.rm { border-color: rgba(220,80,80,.3); color: #dc8080; background: rgba(220,80,80,.1); }
    .mini-row-btn.rm:hover { border-color: #dc5050; }
    /* upload pic box always visible on right */
    .pic-upload-box { width: 100%; border: 2px dashed #6b2020; background: #3d1010; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: all .3s; padding: 28px 16px; }
    .pic-upload-box:hover { border-color: #f5c842; background: rgba(245,200,66,.04); }
    @media (max-width: 768px) {
      .hero-grid { grid-template-columns: 1fr !important; }
      .about-grid { grid-template-columns: 1fr !important; }
      .contact-grid { grid-template-columns: 1fr !important; }
      nav { padding: 0 20px !important; }
      section { padding-left: 20px !important; padding-right: 20px !important; }
      footer { padding: 20px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;
 
    const DEFAULTS = {
      name: "Dharanitharan G",
      title: "Graphic Designer",
      bio: "I am honing my skills in Graphic Design to design brochures, Magazines, Business Cards, ID Cards, Logos, Social Media Posters, Banners, Book Cover Pages, and packaging designs, etc. My skills include Adobe Illustrator, InDesign, and Photoshop.",
      email: "dharanitharan12027@gmail.com",
      location: "Gobichettipalayam, Erode District",
      available: true,
      skills: ["Adobe Illustrator", "Adobe InDesign", "Adobe Photoshop", "Logo Design", "Brochure Design", "Social Media Posters", "Business Cards", "Packaging Design", "Banner Design", "Book Cover Design"],
      instagram: "@dharani.designs_12",
      linkedin: "https://www.linkedin.com/in/dharani-tharan-36982025b",
    };
 
    const InstagramIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    );
    const LinkedInIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
      </svg>
    );
    const ChevronLeft = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polyline points="15,18 9,12 15,6"/></svg>;
    const ChevronRight = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polyline points="9,18 15,12 9,6"/></svg>;
    const CloseIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const UploadIcon = () => <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f5c842" strokeWidth="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
 
    function Portfolio() {
      // Load saved profile from localStorage on first load
      const savedProfile = (() => { try { const s = localStorage.getItem("portfolio_profile"); return s ? JSON.parse(s) : DEFAULTS; } catch(e) { return DEFAULTS; } })();
      const savedPic = (() => { try { return localStorage.getItem("portfolio_pic") || null; } catch(e) { return null; } })();
 
      const [profile, setProfile] = useState(savedProfile);
      const [profilePic, setProfilePic] = useState(savedPic);
      const [images, setImages] = useState([]);
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(savedProfile);
      const [skillInput, setSkillInput] = useState("");
      const [lightbox, setLightbox] = useState(null);
      const [lbIdx, setLbIdx] = useState(0);
      const [toast, setToast] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const [activeSection, setActiveSection] = useState("hero");
      const [loaded, setLoaded] = useState(false);
 
      const picRef = useRef();
      const galleryRef = useRef();
      const toastRef = useRef();
 
      useEffect(() => { setTimeout(() => setLoaded(true), 80); }, []);
 
      const showToast = (msg, err = false) => {
        clearTimeout(toastRef.current);
        setToast({ msg, err });
        toastRef.current = setTimeout(() => setToast(null), 3000);
      };
 
      const handlePic = (e) => {
        const f = e.target.files[0];
        if (!f || !f.type.startsWith("image/")) return;
        const r = new FileReader();
        r.onload = ev => {
          setProfilePic(ev.target.result);
          try { localStorage.setItem("portfolio_pic", ev.target.result); } catch(e) {}
          showToast("Profile photo updated");
        };
        r.readAsDataURL(f);
      };
 
      const addImages = useCallback((files) => {
        const space = 50 - images.length;
        if (space <= 0) return showToast("Maximum 50 images reached", true);
        const valid = Array.from(files).filter(f => f.type.startsWith("image/")).slice(0, space);
        if (!valid.length) return showToast("No valid images found", true);
        Promise.all(valid.map(f => new Promise(res => {
          const r = new FileReader();
          r.onload = ev => res({ src: ev.target.result, name: f.name, id: Math.random().toString(36).slice(2) });
          r.readAsDataURL(f);
        }))).then(imgs => {
          setImages(prev => [...prev, ...imgs]);
          showToast(`${imgs.length} image${imgs.length > 1 ? "s" : ""} added`);
        });
      }, [images.length]);
 
      const removeImage = (id) => {
        setImages(prev => prev.filter(i => i.id !== id));
        setLightbox(null);
        showToast("Image removed");
      };
 
      const openLb = (img, idx) => { setLightbox(img); setLbIdx(idx); };
      const lbNav = (dir) => {
        const next = (lbIdx + dir + images.length) % images.length;
        setLightbox(images[next]); setLbIdx(next);
      };
 
      useEffect(() => {
        const fn = (e) => {
          if (!lightbox) return;
          if (e.key === "Escape") setLightbox(null);
          if (e.key === "ArrowLeft") lbNav(-1);
          if (e.key === "ArrowRight") lbNav(1);
        };
        window.addEventListener("keydown", fn);
        return () => window.removeEventListener("keydown", fn);
      }, [lightbox, lbIdx, images]);
 
      useEffect(() => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
        }, { threshold: 0.3 });
        ["hero","work","about","contact"].forEach(id => {
          const el = document.getElementById(id); if (el) obs.observe(el);
        });
        return () => obs.disconnect();
      }, []);
 
      const scrollTo = (id) => { document.getElementById(id)?.scrollIntoView({ behavior: "smooth" }); setActiveSection(id); };
      const saveEdit = () => {
        setProfile(draft);
        try { localStorage.setItem("portfolio_profile", JSON.stringify(draft)); } catch(e) {}
        setEditing(false);
        showToast("Changes saved successfully!");
      };
 
      return (
        <div style={{ background: "#2d0a0a", color: "#ffffff", minHeight: "100vh", fontFamily: "Georgia, serif", overflowX: "hidden" }}>
 
          {toast && <div className={`toast${toast.err ? " err" : ""}`}>{toast.msg}</div>}
 
          {/* LIGHTBOX */}
          {lightbox && (
            <div className="lbov" onClick={() => setLightbox(null)}>
              <button className="lbbtn" style={{ top: 18, right: 18 }} onClick={() => setLightbox(null)}><CloseIcon /></button>
              {images.length > 1 && <>
                <button className="lbbtn" style={{ left: 16 }} onClick={e => { e.stopPropagation(); lbNav(-1); }}><ChevronLeft /></button>
                <button className="lbbtn" style={{ right: 16 }} onClick={e => { e.stopPropagation(); lbNav(1); }}><ChevronRight /></button>
              </>}
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16, maxWidth:"92vw" }} onClick={e => e.stopPropagation()}>
                <img src={lightbox.src} alt={lightbox.name} style={{ maxWidth:"88vw", maxHeight:"82vh", objectFit:"contain", display:"block" }} />
                <div style={{ display:"flex", gap:12, alignItems:"center" }}>
                  <span style={{ fontFamily:"'Inconsolata',monospace", fontSize:11, color:"#7a3535", letterSpacing:1 }}>{lbIdx + 1} / {images.length}</span>
                  <button className="dangerbtn" onClick={() => removeImage(lightbox.id)}>Remove</button>
                </div>
              </div>
            </div>
          )}
 
          {/* EDIT MODAL */}
          {editing && (
            <div className="mover" onClick={() => setEditing(false)}>
              <div className="mbox" onClick={e => e.stopPropagation()}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:32 }}>
                  <h2 style={{ fontFamily:"'Playfair Display',serif", fontWeight:400, fontSize:30, color:"#ffffff" }}>Edit Profile</h2>
                  <button className="ghostbtn" onClick={() => setEditing(false)}>✕ Close</button>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                    {[["Name","name"],["Title / Role","title"]].map(([l,k]) => (
                      <div key={k}><span className="lbl">{l}</span>
                        <input className="field" value={draft[k]} onChange={e => setDraft(p => ({...p,[k]:e.target.value}))} />
                      </div>
                    ))}
                  </div>
                  <div><span className="lbl">Bio</span>
                    <textarea className="field" value={draft.bio} onChange={e => setDraft(p => ({...p,bio:e.target.value}))} />
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                    {[["Email","email"],["Location","location"]].map(([l,k]) => (
                      <div key={k}><span className="lbl">{l}</span>
                        <input className="field" value={draft[k]} onChange={e => setDraft(p => ({...p,[k]:e.target.value}))} />
                      </div>
                    ))}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                    <div><span className="lbl">Instagram</span>
                      <input className="field" value={draft.instagram} placeholder="@handle" onChange={e => setDraft(p => ({...p,instagram:e.target.value}))} />
                    </div>
                    <div><span className="lbl">LinkedIn URL</span>
                      <input className="field" value={draft.linkedin} placeholder="https://linkedin.com/in/..." onChange={e => setDraft(p => ({...p,linkedin:e.target.value}))} />
                    </div>
                  </div>
                  <div>
                    <span className="lbl">Skills</span>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:12 }}>
                      {draft.skills.map((s,i) => (
                        <span key={i} className="schip">{s}
                          <button className="rmsk" onClick={() => setDraft(p => ({...p,skills:p.skills.filter((_,j)=>j!==i)}))}>×</button>
                        </span>
                      ))}
                    </div>
                    <div style={{ display:"flex", gap:8 }}>
                      <input className="field" style={{ flex:1 }} placeholder="New skill…" value={skillInput}
                        onChange={e => setSkillInput(e.target.value)}
                        onKeyDown={e => { if(e.key==="Enter"&&skillInput.trim()){setDraft(p=>({...p,skills:[...p.skills,skillInput.trim()]}));setSkillInput("");} }} />
                      <button className="ghostbtn" onClick={() => { if(skillInput.trim()){setDraft(p=>({...p,skills:[...p.skills,skillInput.trim()]}));setSkillInput("");} }}>Add</button>
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 0", borderTop:"1px solid #6b2020" }}>
                    <input type="checkbox" id="avail" checked={draft.available} onChange={e => setDraft(p => ({...p,available:e.target.checked}))} />
                    <label htmlFor="avail" style={{ fontFamily:"'Inconsolata',monospace", fontSize:11, color:"#c9a0a0", letterSpacing:1, cursor:"pointer" }}>Available for new projects</label>
                  </div>
                </div>
                {/* SAVE BUTTON — always visible */}
                <div style={{ display:"flex", justifyContent:"flex-end", gap:12, marginTop:32, paddingTop:24, borderTop:"1px solid #6b2020" }}>
                  <button className="ghostbtn" onClick={() => setEditing(false)}>Cancel</button>
                  <button className="gbtn" onClick={saveEdit}><span className="gbtn-t">✓ Save Changes</span></button>
                </div>
              </div>
            </div>
          )}
 
          {/* NAV */}
          <nav style={{ position:"fixed", top:0, left:0, right:0, zIndex:200, padding:"0 32px", height:64, display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(20,3,3,.97)", backdropFilter:"blur(16px)", borderBottom:"1px solid #6b2020" }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, fontWeight:400, letterSpacing:1, cursor:"pointer", color:"#ffffff" }} onClick={() => scrollTo("hero")}>
              Dharanitharan<span style={{ color:"#ffffff", fontStyle:"normal" }}> G</span>
            </div>
            <div style={{ display:"flex", gap:4 }}>
              {[["hero","Home"],["work","Work"],["about","About"],["contact","Contact"]].map(([id,label]) => (
                <span key={id} className={`npill${activeSection===id?" act":""}`} onClick={() => scrollTo(id)}>{label}</span>
              ))}
            </div>
            <button className="gbtn" style={{ fontSize:10, padding:"8px 18px" }} onClick={() => { setDraft({...profile}); setEditing(true); }}>
              <span className="gbtn-t">Edit Profile</span>
            </button>
          </nav>
 
          {/* HERO */}
          <section id="hero" style={{ minHeight:"100vh", display:"flex", alignItems:"center", padding:"100px 48px 60px", position:"relative", overflow:"hidden", background:"linear-gradient(135deg,#2d0a0a 0%,#3d1010 50%,#2d0a0a 100%)" }}>
            <div style={{ position:"absolute", top:"12%", right:"6%", width:360, height:360, borderRadius:"50%", background:"radial-gradient(circle,rgba(245,200,66,.08) 0%,transparent 70%)", pointerEvents:"none" }} />
            <div style={{ position:"absolute", bottom:"18%", left:"4%", width:1, height:220, background:"linear-gradient(to bottom,transparent,rgba(245,200,66,.4),transparent)", pointerEvents:"none" }} />
 
            <div className="hero-grid" style={{ maxWidth:1080, width:"100%", margin:"0 auto", display:"grid", gridTemplateColumns:"1fr 1fr", gap:80, alignItems:"center" }}>
 
              {/* LEFT — text */}
              <div style={{ opacity:loaded?1:0, transform:loaded?"translateY(0)":"translateY(20px)", transition:"opacity .9s ease, transform .9s ease" }}>
                {profile.available && (
                  <div style={{ display:"inline-flex", alignItems:"center", marginBottom:28, background:"rgba(74,222,128,.06)", border:"1px solid rgba(74,222,128,.2)", padding:"6px 14px" }}>
                    <span className="avdot" />
                    <span style={{ fontFamily:"'Inconsolata',monospace", fontSize:10, letterSpacing:2, color:"#4ade80" }}>AVAILABLE FOR WORK</span>
                  </div>
                )}
                <div className="sec-lbl">Creative Portfolio</div>
 
                {/* NAME — CAPITAL + G in white, responsive size, single line */}
                <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(26px,3.2vw,50px)", fontWeight:500, lineHeight:1.15, marginBottom:24, whiteSpace:"nowrap" }}>
                  <span style={{ color:"#ffffff", textTransform:"uppercase", letterSpacing:"2px" }}>DHARANITHARAN </span>
                  <span style={{ color:"#ffffff", fontStyle:"normal" }}>G</span>
                </h1>
 
                <div className="la" style={{ marginBottom:20 }} />
                <p style={{ fontFamily:"'Inconsolata',monospace", fontSize:11, letterSpacing:2, color:"#f5c842", marginBottom:18, textTransform:"uppercase" }}>{profile.title}</p>
                <p style={{ color:"#f0e6e6", lineHeight:1.85, fontSize:14.5, maxWidth:420, marginBottom:36 }}>{profile.bio}</p>
                <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                  <button className="gbtn" onClick={() => scrollTo("work")}><span className="gbtn-t">View My Work</span></button>
                  <button className="ghostbtn" onClick={() => scrollTo("contact")}>Contact Me</button>
                </div>
              </div>
 
              {/* RIGHT — profile pic upload box always visible */}
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16, opacity:loaded?1:0, transform:loaded?"translateY(0)":"translateY(20px)", transition:"opacity .9s ease .15s, transform .9s ease .15s" }}>
 
                {/* Profile picture box */}
                <div style={{ width:"100%", position:"relative" }}>
                  {profilePic ? (
                    <div style={{ position:"relative" }}>
                      <img src={profilePic} alt="Profile" style={{ width:"100%", height:320, objectFit:"cover", display:"block", border:"2px solid #f5c842" }} />
                      <button onClick={() => picRef.current.click()} style={{ position:"absolute", bottom:10, right:10, background:"rgba(45,10,10,.9)", border:"1px solid #f5c842", color:"#f5c842", padding:"6px 14px", fontFamily:"'Inconsolata',monospace", fontSize:10, letterSpacing:1, cursor:"pointer" }}>
                        ↑ Change Photo
                      </button>
                    </div>
                  ) : (
                    <div className="pic-upload-box" onClick={() => picRef.current.click()}>
                      <UploadIcon />
                      <span style={{ fontFamily:"'Playfair Display',serif", fontSize:16, color:"#c9a0a0" }}>Upload Profile Photo</span>
                      <span style={{ fontFamily:"'Inconsolata',monospace", fontSize:10, color:"#7a3535", letterSpacing:2 }}>CLICK TO BROWSE</span>
                    </div>
                  )}
                </div>
                <input ref={picRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handlePic} />
 
                {/* Stats */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:2, width:"100%", background:"#6b2020" }}>
                  {[[images.length,"Gallery"],["50+","Designs"]].map(([n,l]) => (
                    <div key={l} className="sbox"><div className="snum">{n}</div><div className="slbl">{l}</div></div>
                  ))}
                </div>
              </div>
            </div>
          </section>
 
          {/* WORK / GALLERY */}
          <section id="work" style={{ padding:"100px 48px", borderTop:"1px solid #6b2020", background:"#3d1010" }}>
            <div style={{ maxWidth:1080, margin:"0 auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:48, flexWrap:"wrap", gap:20 }}>
                <div>
                  <div className="sec-lbl">Selected Work</div>
                  <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(36px,4vw,56px)", fontWeight:400, lineHeight:1.1, color:"#ffffff" }}>
                    Design <span style={{ fontStyle:"italic", color:"#f5c842" }}>Gallery</span>
                  </h2>
                  <div style={{ fontFamily:"'Inconsolata',monospace", fontSize:11, color:"#c9a0a0", marginTop:10, letterSpacing:1 }}>
                    {images.length} / 50 · click to expand · keyboard arrows to navigate
                  </div>
                </div>
                {images.length < 50 && (
                  <button className="gbtn" onClick={() => galleryRef.current.click()}><span className="gbtn-t">+ Add Images</span></button>
                )}
              </div>
              <input ref={galleryRef} type="file" accept="image/*" multiple style={{ display:"none" }} onChange={e => addImages(e.target.files)} />
 
              {images.length === 0 ? (
                <div className={`dzone${dragOver?" ov":""}`} style={{ padding:"72px 40px" }}
                  onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={e => { e.preventDefault(); setDragOver(false); addImages(e.dataTransfer.files); }}
                  onClick={() => galleryRef.current.click()}>
                  <div style={{ fontSize:52, color:"#6b2020", marginBottom:20 }}>⬡</div>
                  <p style={{ fontFamily:"'Playfair Display',serif", fontSize:28, fontWeight:300, color:"#c9a0a0", marginBottom:12 }}>Drop your designs here</p>
                  <p style={{ fontFamily:"'Inconsolata',monospace", fontSize:11, color:"#7a3535", letterSpacing:2 }}>or click to browse · max 50 images</p>
                </div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:10 }}
                  onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={e => { e.preventDefault(); setDragOver(false); addImages(e.dataTransfer.files); }}>
                  {images.map((img,idx) => (
                    <div key={img.id} className="gcrd" onClick={() => openLb(img,idx)}>
                      <img src={img.src} alt={img.name} />
                      <div className="gcrd-ov">
                        <div className="gcrd-row">
                          <button className="mini-row-btn" onClick={e => { e.stopPropagation(); openLb(img,idx); }}>Expand</button>
                          <button className="mini-row-btn rm" onClick={e => { e.stopPropagation(); removeImage(img.id); }}>✕ Remove</button>
                        </div>
                      </div>
                    </div>
                  ))}
                  {images.length < 50 && (
                    <div className="addcrd" onClick={() => galleryRef.current.click()}>
                      <span style={{ fontSize:28, marginBottom:6 }}>+</span>
                      <span style={{ fontSize:9, letterSpacing:3 }}>ADD MORE</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          </section>
 
          {/* ABOUT */}
          <section id="about" style={{ padding:"100px 48px", borderTop:"1px solid #6b2020", background:"#2d0a0a" }}>
            <div className="about-grid" style={{ maxWidth:1080, margin:"0 auto", display:"grid", gridTemplateColumns:"1.1fr 1fr", gap:80, alignItems:"start" }}>
              <div>
                <div className="sec-lbl">About Me</div>
                <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(36px,4vw,56px)", fontWeight:400, lineHeight:1.1, marginBottom:28, color:"#ffffff" }}>
                  Crafting Worlds<br /><span style={{ fontStyle:"italic", color:"#f5c842" }}>Through Design</span>
                </h2>
                <div className="la" style={{ marginBottom:24 }} />
                <p style={{ color:"#f0e6e6", lineHeight:1.9, fontSize:14.5, marginBottom:28 }}>{profile.bio}</p>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {[["◎",profile.location],["◉",profile.email]].map(([icon,val]) => (
                    <div key={val} style={{ display:"flex", alignItems:"center", gap:10, color:"#f0e6e6", fontFamily:"'Inconsolata',monospace", fontSize:12 }}>
                      <span style={{ color:"#f5c842" }}>{icon}</span>{val}
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="sec-lbl" style={{ marginBottom:16 }}>Skills</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:40 }}>
                  {profile.skills.map((s,i) => <span key={i} className="schip">{s}</span>)}
                </div>
                {profile.available && (
                  <div style={{ border:"1px solid rgba(74,222,128,.2)", background:"rgba(74,222,128,.05)", padding:"20px 22px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                      <span className="avdot" />
                      <span style={{ fontFamily:"'Inconsolata',monospace", fontSize:10, letterSpacing:2, color:"#4ade80" }}>OPEN TO OPPORTUNITIES</span>
                    </div>
                    <p style={{ color:"#c9a0a0", fontSize:12, fontFamily:"'Inconsolata',monospace", lineHeight:1.7 }}>
                      Currently accepting freelance projects and full-time roles. Let's build something remarkable.
                    </p>
                  </div>
                )}
              </div>
            </div>
          </section>
 
          {/* CONTACT */}
          <section id="contact" style={{ padding:"100px 48px", borderTop:"1px solid #6b2020", background:"#3d1010" }}>
            <div className="contact-grid" style={{ maxWidth:1080, margin:"0 auto", display:"grid", gridTemplateColumns:"1fr 1fr", gap:80, alignItems:"center" }}>
              <div>
                <div className="sec-lbl">Get In Touch</div>
                <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(40px,5vw,68px)", fontWeight:400, lineHeight:1.05, marginBottom:28, color:"#ffffff" }}>
                  Let's Work<br /><span style={{ fontStyle:"italic", color:"#f5c842" }}>Together.</span>
                </h2>
                <div className="la" style={{ marginBottom:24 }} />
                <p style={{ color:"#f0e6e6", lineHeight:1.85, fontSize:14.5, maxWidth:380 }}>
                  Open to creative collaborations, brand projects, and meaningful work. Connect on social media.
                </p>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                <div style={{ border:"1px solid #6b2020", padding:"18px 22px", background:"#4a1515" }}>
                  <div style={{ fontFamily:"'Inconsolata',monospace", fontSize:9, letterSpacing:3, color:"#c9a0a0", textTransform:"uppercase", marginBottom:6 }}>Email</div>
                  <div style={{ fontSize:15, color:"#f5c842" }}>{profile.email}</div>
                </div>
                <div style={{ border:"1px solid #6b2020", padding:"18px 22px", background:"#4a1515" }}>
                  <div style={{ fontFamily:"'Inconsolata',monospace", fontSize:9, letterSpacing:3, color:"#c9a0a0", textTransform:"uppercase", marginBottom:6 }}>Location</div>
                  <div style={{ fontSize:15, color:"#f0e6e6" }}>{profile.location}</div>
                </div>
                <button className="slink" onClick={() => window.open(`https://instagram.com/${profile.instagram.replace("@","")}`, "_blank")}>
                  <InstagramIcon /><span style={{ flex:1 }}>Instagram</span><span style={{ color:"#f5c842", fontSize:12 }}>{profile.instagram}</span>
                </button>
                <button className="slink" onClick={() => window.open(profile.linkedin, "_blank")}>
                  <LinkedInIcon /><span style={{ flex:1 }}>LinkedIn — Dharanitharan G</span><span style={{ color:"#f5c842", fontSize:12 }}>View Profile →</span>
                </button>
              </div>
            </div>
          </section>
 
          {/* FOOTER */}
          <footer style={{ padding:"28px 48px", borderTop:"1px solid #6b2020", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12, background:"#1e0505" }}>
            <span style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:400, color:"#ffffff" }}>
              DHARANITHARAN<span style={{ color:"#ffffff", fontStyle:"normal" }}> G</span>
            </span>
            <span style={{ fontFamily:"'Inconsolata',monospace", fontSize:10, color:"#c9a0a0", letterSpacing:2 }}>
              © {new Date().getFullYear()} DHARANITHARAN G
            </span>
            <div style={{ display:"flex", gap:8 }}>
              <button className="ghostbtn" style={{ padding:"6px 12px" }} onClick={() => window.open(`https://instagram.com/${profile.instagram.replace("@","")}`, "_blank")}><InstagramIcon /></button>
              <button className="ghostbtn" style={{ padding:"6px 12px" }} onClick={() => window.open(profile.linkedin, "_blank")}><LinkedInIcon /></button>
            </div>
          </footer>
        </div>
      );
    }
 
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Portfolio />);
  </script>
</body>
</html>
