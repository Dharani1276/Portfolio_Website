<script type="text/babel">
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;
const MAX_MSG = 2000;

/* ══════════════════════════════════════════════════
   GALLERY_IMAGES — images baked directly into HTML.
   When you "Export & Download", a new index.html is
   generated with your uploaded images embedded here,
   so they appear for EVERYONE who visits the site.
══════════════════════════════════════════════════ */
const GALLERY_IMAGES = [
  /* IMAGES_PLACEHOLDER */
];

const DEFAULTS = {
  name:"Dharanitharan G", title:"Graphic Designer",
  bio:"I am honing my skills in Graphic Design to design brochures, Magazines, Business Cards, ID Cards, Logos, Social Media Posters, Banners, Book Cover Pages, and packaging designs, etc. My skills include Adobe Illustrator, InDesign, and Photoshop.",
  email:"dharanitharan12027@gmail.com", location:"Gobichettipalayam, Erode District", available:true,
  skills:["Adobe Illustrator","Adobe InDesign","Adobe Photoshop","Logo Design","Brochure Design","Social Media Posters","Business Cards","Packaging Design","Banner Design","Book Cover Design"],
  instagram:"@dharani.designs_12", linkedin:"https://www.linkedin.com/in/dharani-tharan-36982025b"
};

/* ── ICONS ── */
const IgIcon  = ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>;
const LiIcon  = ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>;
const CL      = ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polyline points="15,18 9,12 15,6"/></svg>;
const CR      = ()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><polyline points="9,18 15,12 9,6"/></svg>;
const XI      = ()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const DIcon   = ()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>;
const MIcon   = ()=><svg width="11" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18" strokeWidth="3"/></svg>;

/* ── localStorage helpers ── */
const lsGet = (k,d)=>{ try{const s=localStorage.getItem(k);return s?JSON.parse(s):d;}catch(e){return d;} };
const lsSet = (k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} };

/* ══════════════════════════
   EXPORT — bakes images into
   a new downloadable index.html
══════════════════════════ */
async function exportHTML(images, pic) {
  const src = await fetch(window.location.href).then(r=>r.text());
  // Replace GALLERY_IMAGES placeholder with actual base64 data
  const imgJson = JSON.stringify(images.map(({src,name,id})=>({src,name,id})));
  let out = src.replace(
    /const GALLERY_IMAGES = \[[\s\S]*?\/\* IMAGES_PLACEHOLDER \*\/[\s\S]*?\];/,
    `const GALLERY_IMAGES = ${imgJson};`
  );
  // Also bake in the profile pic
  if (pic) {
    out = out.replace(
      /const BAKED_PIC = null;/,
      `const BAKED_PIC = ${JSON.stringify(pic)};`
    );
  }
  const blob = new Blob([out], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
}

/* ════════════════════════
   PORTFOLIO COMPONENT
════════════════════════ */
const BAKED_PIC = null;

function Portfolio() {
  const [profile,  setProfile ] = useState(()=>lsGet("p_pr",DEFAULTS));
  // Profile pic: baked-in wins over localStorage
  const [pic,      setPic     ] = useState(()=>{
    if(BAKED_PIC) return BAKED_PIC;
    try{return localStorage.getItem("p_pic")||null;}catch(e){return null;}
  });
  // Images: start from baked-in array, then user can add more this session
  const [images,   setImages  ] = useState(()=>
    GALLERY_IMAGES.map((img,i)=>({...img, id:img.id||`baked_${i}`}))
  );
  const [sessionNew, setSessionNew] = useState([]); // newly added this session (not yet exported)
  const [editing,  setEditing ] = useState(false);
  const [draft,    setDraft   ] = useState(()=>lsGet("p_pr",DEFAULTS));
  const [skillIn,  setSkillIn ] = useState("");
  const [lb,       setLb      ] = useState(null);
  const [lbIdx,    setLbIdx   ] = useState(0);
  const [toast,    setToast   ] = useState(null);
  const [drag,     setDrag    ] = useState(false);
  const [activeS,  setActiveS ] = useState("hero");
  const [view,     setView    ] = useState("desktop");
  const [wipe,     setWipe    ] = useState(false);
  const [form,     setForm    ] = useState({name:"",email:"",subject:"",message:""});
  const [sent,     setSent    ] = useState(false);
  const [revealed, setRevealed] = useState({});
  const [exporting,setExporting]= useState(false);
  const picRef = useRef(); const gallRef = useRef(); const tRef = useRef();

  /* ── REVEAL OBSERVER ── */
  useEffect(()=>{
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ setRevealed(v=>({...v,[e.target.dataset.rid]:e.isIntersecting})); });
    },{threshold:0.1});
    document.querySelectorAll("[data-rid]").forEach(el=>obs.observe(el));
    return ()=>obs.disconnect();
  },[]);
  useEffect(()=>{
    Object.entries(revealed).forEach(([rid,isVis])=>{
      document.querySelectorAll(`[data-rid="${rid}"]`).forEach(el=>{
        isVis ? el.classList.add("vis") : el.classList.remove("vis");
      });
    });
  },[revealed]);

  /* ── ACTIVE SECTION ── */
  useEffect(()=>{
    const obs=new IntersectionObserver(es=>{
      es.forEach(e=>{if(e.isIntersecting)setActiveS(e.target.id);});
    },{threshold:0.25});
    ["hero","work","about","contact"].forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return ()=>obs.disconnect();
  },[]);

  const toast$ = (msg,err=false)=>{ clearTimeout(tRef.current); setToast({msg,err}); tRef.current=setTimeout(()=>setToast(null),3500); };

  const scrollTo = id=>{
    setWipe(true);
    setTimeout(()=>{ document.getElementById(id)?.scrollIntoView({behavior:"smooth"}); setActiveS(id); setTimeout(()=>setWipe(false),360); },280);
  };

  /* ── PROFILE PIC ── */
  const handlePic = e=>{
    const f=e.target.files[0]; if(!f||!f.type.startsWith("image/"))return;
    const r=new FileReader();
    r.onload=ev=>{ setPic(ev.target.result); try{localStorage.setItem("p_pic",ev.target.result);}catch(e){} toast$("Profile photo updated ✓"); };
    r.readAsDataURL(f);
  };
  const removePic=()=>{ setPic(null); try{localStorage.removeItem("p_pic");}catch(e){} toast$("Photo removed"); };

  /* ── ADD IMAGES (session only — must export to make permanent) ── */
  const addImages = useCallback(files=>{
    const space=50-images.length; if(space<=0)return toast$("Max 50 images",true);
    const valid=Array.from(files).filter(f=>f.type.startsWith("image/")).slice(0,space);
    if(!valid.length)return toast$("No valid images",true);
    Promise.all(valid.map(f=>new Promise(res=>{
      const r=new FileReader();
      r.onload=ev=>res({src:ev.target.result,name:f.name,id:Math.random().toString(36).slice(2)});
      r.readAsDataURL(f);
    }))).then(newImgs=>{
      setImages(prev=>[...prev,...newImgs]);
      setSessionNew(prev=>[...prev,...newImgs.map(i=>i.id)]);

                </div>
              ):(
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  <div><span className="lbl">Name <span style={{color:"#dc5050"}}>*</span></span><input className="field" placeholder="Your full name" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
                  <div><span className="lbl">Email <span style={{color:"#dc5050"}}>*</span></span><input className="field" type="email" placeholder="your@email.com" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
                  <div><span className="lbl">Subject</span><input className="field" placeholder="What is this about?" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))}/></div>
                  <div>
                    <span className="lbl">Leave as a Message <span style={{color:"#dc5050"}}>*</span></span>
                    <textarea className="field" style={{minHeight:150}} placeholder="Write your message here… (up to 2,000 characters)" maxLength={MAX_MSG} value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))}/>
                    <div className="char-bar"><div className={`char-fill ${msgClass}`} style={{width:`${(msgLen/MAX_MSG)*100}%`}}/></div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                      <span style={{fontFamily:"'Inconsolata',monospace",fontSize:10,color:msgClass==="over"?"#ff6060":msgClass==="warn"?"#f59c42":"#7a3535",letterSpacing:1}}>{msgLen.toLocaleString()} / {MAX_MSG.toLocaleString()} characters</span>
                      {msgLen>0&&<span style={{fontFamily:"'Inconsolata',monospace",fontSize:9,color:"#5a2020"}}>{(MAX_MSG-msgLen).toLocaleString()} remaining</span>}
                    </div>
                  </div>
                  <div style={{marginTop:20,display:"flex",justifyContent:"center"}}>
                    <button className="submit-btn" style={{maxWidth:260,padding:"13px 40px"}} onClick={submitForm}><span>Send →</span></button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{padding:"36px 48px",borderTop:"1px solid #6b2020",background:"#1e0505",paddingBottom:hasNew?"90px":"36px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:24}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:400,color:"#fff"}}>DHARANITHARAN<span style={{color:"#fff"}}> G</span></span>
          <div style={{display:"flex",gap:8}}>
            <button className="ghostbtn" style={{padding:"6px 12px"}} onClick={()=>window.open(`https://instagram.com/${profile.instagram.replace("@","")}`, "_blank")}><IgIcon/></button>
            <button className="ghostbtn" style={{padding:"6px 12px"}} onClick={()=>window.open(profile.linkedin,"_blank")}><LiIcon/></button>
          </div>
        </div>
        <div style={{borderTop:"1px solid #3d1010",paddingTop:20,textAlign:"center"}}>
          <div style={{fontFamily:"'Inconsolata',monospace",fontSize:11,color:"#c9a0a0",letterSpacing:2,marginBottom:6}}>© 2026 By Dharanitharan G</div>
          <div style={{fontFamily:"'Inconsolata',monospace",fontSize:10,color:"#7a3535",letterSpacing:2}}>All Rights Reserved</div>
        </div>
      </footer>

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Portfolio/>);
</script>
</script>
</body>
</html>
